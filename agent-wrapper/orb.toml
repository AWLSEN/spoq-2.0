[agent]
name = "spoq-wrapper"
lang = "node"
entry = "server.js"

[agent.env]
PORT = "8000"
ANTHROPIC_BASE_URL = "https://api.anthropic.com"
ANTHROPIC_MODEL = "claude-haiku-4-5"
ANTHROPIC_DEFAULT_OPUS_MODEL = "claude-haiku-4-5"
ANTHROPIC_DEFAULT_SONNET_MODEL = "claude-haiku-4-5"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "claude-haiku-4-5"
CLAUDE_CODE_MAX_OUTPUT_TOKENS = "8192"
API_TIMEOUT_MS = "300000"
ANTHROPIC_AUTH_TOKEN = "${ANTHROPIC_AUTH_TOKEN}"

[backend]
provider = "custom"
api_base = "https://api.anthropic.com"
routes = ["POST /v1/messages", "POST /v1/messages/count_tokens"]
forward_headers = ["x-api-key", "authorization", "anthropic-version", "anthropic-beta"]

[network]
outbound = [
  "api.anthropic.com",
  "backend.composio.dev",
  "mcp.composio.dev",
  "github.com",
  "codeload.github.com",
  "registry.npmjs.org",
  "registry.npmjs.com",
]

[source]
git = "https://github.com/AWLSEN/spoq-2.0"
branch = "main"

[build]
working_dir = "/agent/code/agent-wrapper"
steps = [
  "cd /agent/code && ls",
  "npm install -g @anthropic-ai/claude-code@2.1.116",
  "cd /agent/code/agent-wrapper && npm install --omit=dev",
]

[ports]
expose = [8000]
